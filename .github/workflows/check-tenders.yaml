name: check-tenders

on:
  schedule:
    # Weekdays at 05:00 UTC (~07:00 Europe/Berlin). Adjust as needed.
    - cron: "0 5 * * 1-5"
  workflow_dispatch:
    inputs:
      login:
        description: "VMP-BB: log in before scraping (default ON; the API portals are login-free). Needs VMP_BB_* secrets."
        type: boolean
        default: true
      notice:
        description: "VMP-BB: also read Bekanntmachung PDFs (forces login; default ON). Needs VMP_BB_* secrets."
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  check-tenders:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      VMP_BB_USERNAME: ${{ secrets.VMP_BB_USERNAME }}
      VMP_BB_PASSWORD: ${{ secrets.VMP_BB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable

      - name: Install package + dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::sessioninfo
            local::.

      - name: Restore previous report state from gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages --depth 1 || true
          git worktree remove --force ../gh-pages 2>/dev/null || true
          git worktree prune || true
          rm -rf ../gh-pages
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add --detach ../gh-pages origin/gh-pages
          fi
          mkdir -p reports
          if [ -f ../gh-pages/reports/tenders_state.rds ]; then
            cp ../gh-pages/reports/tenders_state.rds reports/
            echo "Restored previous state for the 'new since last run' diff."
          else
            echo "No previous state found (first run)."
          fi
          if [ -f ../gh-pages/reports/detail_cache.rds ]; then
            cp ../gh-pages/reports/detail_cache.rds reports/
            echo "Restored detail-screening cache (only new tenders get deep-screened)."
          fi
          if [ -f ../gh-pages/reports/notice_cache.rds ]; then
            cp ../gh-pages/reports/notice_cache.rds reports/
            echo "Restored notice-screening cache."
          fi

      - name: Check tenders
        env:
          CHROMOTE_CHROME: ${{ steps.setup-chrome.outputs.chrome-path }}
        # --no-sandbox is required on the Linux runner (Chrome runs as root);
        # it must NOT be set on Windows. Hence it is applied only here, not in
        # vmp_bb_session()'s defaults.
        run: >
          Rscript -e 'chromote::set_chrome_args(c("--no-sandbox", "--disable-dev-shm-usage")); kwb.tenders::screen_all_portals(vmp_bb_login = ${{ github.event.inputs.login != 'false' && 'TRUE' || 'FALSE' }}, vmp_bb_notice = ${{ github.event.inputs.notice != 'false' && 'TRUE' || 'FALSE' }})'

      - name: Publish report to gh-pages
        run: |
          if [ ! -d reports ] || [ -z "$(ls -A reports 2>/dev/null)" ]; then
            echo "::warning::check_tenders() produced no reports/ -- nothing to publish."
            exit 0
          fi
          echo "reports/ contents:"; ls -la reports
          if [ ! -d ../gh-pages ]; then
            git worktree add --force -B gh-pages ../gh-pages
          fi
          mkdir -p ../gh-pages/reports
          cp -f reports/* ../gh-pages/reports/
          cd ../gh-pages
          git add reports
          if git diff --staged --quiet; then
            echo "Report unchanged -- nothing to publish."
            exit 0
          fi
          git commit -m "data: tender report $(date -u +%F)"
          git pull --rebase origin gh-pages || true
          git push origin HEAD:gh-pages || {
            git pull --rebase origin gh-pages
            git push origin HEAD:gh-pages
          }

      - name: Upload Excel artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: tender-report
          path: reports/*.xlsx
          if-no-files-found: ignore
