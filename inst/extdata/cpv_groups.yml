- prefix: "65130"      # Betrieb von Wasserversorgungsunternehmen
  groups: [smart-city-infrastructure]
- prefix: "45232"      # Wasser-/Abwasserrohrleitungen, Kanalbau
  groups: [smart-city-infrastructure]
- prefix: "45231300"   # Bau von Wasser- und Abwasserrohrleitungen
