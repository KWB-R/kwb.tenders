# CPV (Common Procurement Vocabulary) prefix -> KWB research-group slugs.
# A tender's CPV codes are matched by prefix (digits only); all matches count.
# Slugs must match the keywords_<slug>.yml files. Comments give the CPV label.
#
# NOTE: construction works (division 45, "Bauarbeiten") are deliberately NOT
# mapped -- KWB does studies / planning / monitoring, not Bau. Construction
# tenders are additionally vetoed by CPV in apply_title_excludes() (a "45..."
# works code without a "71..." engineering-services code => Bauauftrag => out).
# Likewise "716" (generic inspection) and "76" (oil/gas drilling) are omitted.

# --- Grundwasser (groundwater) ----------------------------------------------
- prefix: "71351"      # Geolog./geophysik. Prospektion, Bodenuntersuchung (Dienstleistung)
  groups: [groundwater]

# --- Wasseraufbereitung & -wiederverwendung (water-treatment-reuse) ----------
- prefix: "65120"      # Betrieb einer Wasseraufbereitungsanlage
  groups: [water-treatment-reuse]
- prefix: "9041"       # Abwasserbeseitigung (Dienstleistung)
  groups: [water-treatment-reuse]
- prefix: "9042"       # Abwasserbehandlung (Dienstleistung)
  groups: [water-treatment-reuse]
- prefix: "90440"      # Klaeranlagen-/Klaergrubendienste
  groups: [water-treatment-reuse, energy-resources]
- prefix: "39350"      # Abwasserreinigungsanlage (Ausruestung)
  groups: [water-treatment-reuse]
- prefix: "42996"      # Maschinen zur Reinigung von Abwasser / Schlammbehandlung
  groups: [water-treatment-reuse]
- prefix: "24962"      # Chemikalien fuer die Wasseraufbereitung
  groups: [water-treatment-reuse]

# --- Regenwasser & Gewaesser (stormwater-surface-waters) --------------------
- prefix: "71353100"   # Hydrografische Untersuchungen (Dienstleistung)
  groups: [stormwater-surface-waters]
- prefix: "71354400"   # Hydrografische Dienste
  groups: [stormwater-surface-waters]
- prefix: "38123"      # Niederschlags-/Verdunstungsschreiber (Messtechnik)
  groups: [stormwater-surface-waters]

# --- Smart City & Infrastruktur (smart-city-infrastructure) -----------------
- prefix: "65110"      # Wasserversorgung / -verteilung (Betrieb)
  groups: [smart-city-infrastructure, water-treatment-reuse]
- prefix: "65130"      # Betrieb von Wasserversorgungsunternehmen
  groups: [smart-city-infrastructure]
- prefix: "9048"       # Abwassernetz-/Kanalmanagement (Dienstleistung)
  groups: [water-treatment-reuse, smart-city-infrastructure]
- prefix: "71800"      # Beratung Wasserversorgung und Abfaelle
  groups: [water-treatment-reuse, smart-city-infrastructure]

# --- Mehrfach / Umwelt ------------------------------------------------------
- prefix: "9070"       # Umweltdienstleistungen
  groups: [stormwater-surface-waters, water-risk]
- prefix: "9073"       # Umweltverschmutzung / Monitoring (inkl. Wasserverschmutzung)
  groups: [stormwater-surface-waters, groundwater]
