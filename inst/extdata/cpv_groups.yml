# NOTE: "716" (Technische Untersuchung/Inspektion) intentionally NOT mapped --
# too generic (caught bridge/pressure-vessel/electrical inspections). Likewise
# "76" (Bohrungen) is oil/gas drilling. Real water lab analysis is captured by
# keywords (Probenahme, Hydrochemie, ...).
