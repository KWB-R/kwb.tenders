# CPV (Common Procurement Vocabulary) prefix -> KWB research-group slugs.
# A tender's CPV codes are matched by prefix (digits only); all matches count.
# Slugs must match the keywords_<slug>.yml files. Comments give the CPV label.
# Keep prefixes SPECIFIC: broad/generic ones produce false positives (see NOTE).

# --- Grundwasser (groundwater) ----------------------------------------------
- prefix: "71351"      # Geologische/geophysikalische Prospektion, Bodenuntersuchung
  groups: [groundwater]
- prefix: "4512"       # Versuchs- und Aufschlussbohrungen
  groups: [groundwater]
- prefix: "45262220"   # Brunnenbohrung
  groups: [groundwater]

# --- Wasseraufbereitung & -wiederverwendung (water-treatment-reuse) ----------
- prefix: "65120"      # Betrieb einer Wasseraufbereitungsanlage
  groups: [water-treatment-reuse]
- prefix: "9041"       # Abwasserbeseitigung
  groups: [water-treatment-reuse]
- prefix: "9042"       # Abwasserbehandlung
  groups: [water-treatment-reuse]
- prefix: "45252"      # Bau von Klaeranlagen / Wasseraufbereitungsanlagen
  groups: [water-treatment-reuse]
- prefix: "45245"      # Nassbagger-/Pumparbeiten fuer Wasseraufbereitungsanlagen
  groups: [water-treatment-reuse]
- prefix: "45259"      # Reparatur/Wartung von Klaeranlagen
  groups: [water-treatment-reuse]
- prefix: "39350"      # Abwasserreinigungsanlage (Ausruestung)
  groups: [water-treatment-reuse]
- prefix: "42996"      # Maschinen zur Reinigung von Abwasser / Schlammbehandlung
  groups: [water-treatment-reuse]
- prefix: "24962"      # Chemikalien fuer die Wasseraufbereitung
  groups: [water-treatment-reuse]
- prefix: "90440"      # Klaeranlagen-/Klaergrubendienste
  groups: [water-treatment-reuse, energy-resources]

